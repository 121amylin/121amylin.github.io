      // 【JQ】
        let str=$('.str').text()
        let max=str.length
        let strArr=str.split('')
        let newStr=''
        for(i=0;i<max;i++){
          newStr+='<span>'+strArr[i]+'</span>'
        }
        $('.str').html(newStr)
        let num=0
        let timer=setInterval(addAm,100)
        function addAm(){
          $('span').eq(num).addClass('textEffect')
          num++
          if(num>=max){
            clearTimer()
            return
          }
        }
        function clearTimer(){
          clearInterval(timer)
          timer=null
        }
    </script>
