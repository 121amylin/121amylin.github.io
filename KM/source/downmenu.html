<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>downmenu</title>
    <style>
      p {
        display: none;
      }
      p.isShow {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <ul>
        <down_menu_item
          v-for="item in list"
          :content="item.content"
          :title="item.title"
        ></down_menu_item>
      </ul>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.11/vue.js"
      integrity="sha512-PyKhbAWS+VlTWXjk/36s5hJmUJBxcGY/1hlxg6woHD/EONP2fawZRKmvHdTGOWPKTqk3CPSUPh7+2boIBklbvw=="
      crossorigin="anonymous"
    ></script>
    <script>
      const down_menu_item = {
        template: `<li>
                <h3><a @click="toggle" href="#">{{title}}</a></h3>
                <p :class="{isShow:isOpen}">{{content}}</p>
                </li>`,
        props: ["title", "content"],
        data() {
          return {
            isOpen: true,
          };
        },
        methods: {
          toggle() {
            this.isOpen = !this.isOpen;
          },
        },
      };
      new Vue({
        el: "#app",
        data: {
          list: [
            {
              title: "t1",
              content: "11",
            },
            {
              title: "t2",
              content: "22",
            },
            {
              title: "t3",
              content: "33",
            },
          ],
        },
        components: {
          down_menu_item,
        },
      });
    </script>
  </body>
</html>
