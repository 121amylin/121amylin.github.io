<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>demo</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
	<!--[if lt IE 9]>
<script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
<script src="https://cdn.jsdelivr.net/respond/1.4.2/respond.min.js" type="text/javascript"></script>
<![endif]-->
	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/3.3.1/js/swiper.min.js"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/3.3.1/css/swiper.min.css" rel="stylesheet">
	<style type="text/css">
		* {
			-webkit-text-size-adjust: none;
			box-sizing: border-box;
			-moz-box-sizing: border-box;
			-webkit-box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 0;
			text-align: center;
			min-width: 1920px;
			background: #fcfcfc;
			position: relative;
		}

		img {
			border: 0;
			padding: 0;
			margin: 0;
			vertical-align: middle;
			max-width: 100%;
			width: auto\9;
			/* ie8 */
		}

		.wrap {
			width: 1920px;
			text-align: center;
			margin: 0 auto;
		}

		.banner {
			width: 100%;
			overflow: hidden;
		}

		.banner-wrap {
			width: 160%;
			position: relative;
			margin: 0 -30%;
		}

		.header {
			width: 100%;
			display: block;
			position: absolute;
			top: 0;
			z-index: 99;
		}

		.content {
			width: 100%;
			display: block;
		}

		.footer {
			position: absolute;
			bottom: 0;
			z-index: 99;
			transform: translateX(-50%);
			left: 50%;
			width: 1920px;
		}
	</style>
</head>

<body>
	<a href="list.html">
		<div class="header"><img src="0612/header.png" alt="" /></div>
		<div class="banner">
			<div class="wrap">
				<div class="banner-wrap">
					<div class="swiper-container-banner">
						<div class="swiper-wrapper">
							<div class="swiper-slide"><img src="0612/banner.jpg" width="1920"></div>
						</div>
						<div class="swiper-pagination"></div>
					</div>
				</div>
			</div>
		</div>
		<div class="content"><img src="0612/home.png" alt="" /></div>
	</a>
	<script type="text/javascript">
		$(document).ready(function () {
			var mySwiper = new Swiper('.swiper-container-banner', {
				// pagination: '.swiper-pagination',
				paginationClickable: true,
				loop: true,
				autoplay: 5000,
				speed: 600,
				autoplayDisableOnInteraction: true
			});
		});
	</script>
</body>
