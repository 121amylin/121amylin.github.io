<!DOCTYPE html>
<html lang="zh-tw">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【瀧澤】美國分公司-新網頁提版需求</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/3.3.1/css/swiper.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <div class="header">
    <a href="Alllist.html"><img src="main1_01.jpg" alt="" /></a>
  </div>
  <div class="banner">
    <div class="wrap">
      <div class="banner-wrap">
        <div class="swiper-container-banner">
          <div class="swiper-wrapper">
            <div class="swiper-slide"><a href="show.html"><img src="banner3.jpg?20210723" /></a></div>
            <div class="swiper-slide"><a href="show.html"><img src="banner1.jpg" /></a></div>

          <div class="swiper-pagination"></div>
        </div>
      </div>
    </div>

  <script type="text/javascript">
    var mySwiper = new Swiper(".swiper-container-banner", {
      pagination: ".swiper-pagination",
      paginationClickable: true,
      loop: true,
      // autoplay: 5000,
      effect: "fade",
      speed: 600,
      autoplayDisableOnInteraction: true,
